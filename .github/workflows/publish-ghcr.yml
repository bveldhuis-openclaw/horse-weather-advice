name: Publish to GHCR

on:
  push:
    branches: [ master, main ]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache-bust assets
        env:
          CACHE_BUST: ${{ github.run_id }}
        run: |
          echo "Using cache-bust=${CACHE_BUST}"
          files=(index.html main.js styles.css manifest.json)
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              sed -E -i "s/(\?v=)[^\"' ]+/\1${CACHE_BUST}/g" "$f" || true
            fi
          done

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/horse-weather-advice:latest
            ghcr.io/${{ github.repository_owner }}/horse-weather-advice:${{ github.sha }}

      - name: Image info
        run: |
          echo "Published image: ghcr.io/${{ github.repository_owner }}/horse-weather-advice:latest"
